<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"> <head>
    <meta charset="UTF-8">
    <title>Hotel Management - Thay mật khẩu</title>
    <link rel="stylesheet" href="/css/auth/style.css">
</head>
<body class="login-body">
<div class="login-wrapper">
    <div class="login-container">
        <div class="login-card">
            <div class="login-content">

                <div th:if="${error}" class="alert alert-danger" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close"></button>
                </div>

                <div th:if="${success}" class="alert alert-success" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close"></button>
                </div>

                <div class="login-header">
                    <h3 class="login-title">Hotel Management System</h3>
                    <p class="login-subtitle">Thay đổi mật khẩu</p>
                </div>

                <form th:action="@{/v1/auth/reset-password}" th:object="${resetPasswordRequest}" method="post">

                    <input type="hidden" name="token" th:value="${token}" />

                    <div class="form-group">
                        <label for="password" class="form-label">Mật khẩu mới</label>
                        <input th:field="*{newPassword}" type="password" class="form-control"
                               id="password" placeholder="*******" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password" class="form-label">Xác nhận mật khẩu</label>
                        <input th:field="*{confirmedPassword}" type="password" class="form-control"
                               id="confirm-password" placeholder="*******" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-login">Thay đổi mật khẩu</button>
                    </div>
                </form>
            </div>

            <div class="card-footer">
                <a th:href="@{/v1/auth/login}" class="a-footer">Quay lại trang đăng nhập</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
