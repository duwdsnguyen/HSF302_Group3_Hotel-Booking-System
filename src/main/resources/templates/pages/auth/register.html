<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Management - Đăng ký</title>
    <link rel="stylesheet" href="/auth/style.css">
</head>
<body class="login-body">
<div class="login-wrapper">
    <div class="login-container">
        <div class="login-card">
            <div class="login-content">
                <div th:if="${error}" th:text="${error}" class="alert alert-danger" role="alert">
                    <button type="button" class="btn-close"></button>
                </div>
                <div th:if="${success}" th:text="${success}" class="alert alert-success" role="alert">
                    <button type="button" class="btn-close"></button>
                </div>

                <div class="login-header">
                    <h3 class="login-title">Hotel Management System</h3>
                    <p class="login-subtitle">Đăng ký tài khoản</p>
                </div>

                <form th:action="@{/v1/auth/register}" th:object="${registerRequestDTO}" method="post">
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <div class="input-group">
                            <input th:field="*{email}" type="email" class="form-control"
                                   id="email" placeholder="name@example.com" required autofocus>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="fullName" class="form-label small fw-bold text-secondary">Full Name:</label>
                        <div class="input-group">
                            <input th:field="*{fullName}" type="text" class="form-control bg-light"
                                   id="fullName"  placeholder="Nguyen Van A" required autofocus>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input th:field="*{password}" type="password" class="form-control"
                               id="password" placeholder="*******" required>
                    </div>
                    <div class="form-group">
                        <label for="phone" class="form-label small fw-bold text-secondary">Phone Number: </label>
                        <div class="input-group">
                            <input th:field="*{phone}" type="text" class="form-control bg-light"
                                   id="phone"  placeholder="0912546565" required autofocus>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-login">Đăng ký</button>
                    </div>
                </form>
            </div>

            <div class="card-footer">
                <span class="span-footer">Đã có tài khoản?</span>
                <a th:href="@{/v1/auth/login}" class="a-footer">Đăng nhập</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
