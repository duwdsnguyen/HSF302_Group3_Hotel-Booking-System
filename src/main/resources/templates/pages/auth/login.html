<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Management - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="justify-content-center align-items-center d-flex">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card p-4 p-sm-5 bg-white">
                    <div th:if="${error}" th:text="${error}" class="alert alert-danger alert-dismissible fade show small py-2" role="alert">
                        <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${success}" th:text="${success}" class="alert alert-success alert-dismissible fade show small py-2" role="alert">
                        <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-dard">Hotel Management System</h3>
                        <p class="text-muted small">Hãy đăng nhập tài khoản</p>
                    </div>
                    <form th:action="@{/v1/auth/login}" th:object="${loginRequestDTO}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label small fw-bold text-secondary">Email</label>
                            <div class="input-group">
                                <input th:field="*{email}" type="email" class="form-control bg-light"
                                       id="email"  placeholder="name@example.com" required autofocus>
                            </div>
                        </div>
                        <div class=" mb-3">
                            <label for="password" class="form-label small fw-bold text-secondary">Password</label>
                            <input  type="password" class="form-control bg-light"
                                    id="password" name="password" placeholder="*******" required autofocus>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold fs-6 shadow-sm">Login</button>
                        </div>
                    </form>
                </div>
                <div class=" d-flex justify-content-center border border-primary rounded mt-3 small  ">
                    <span class="text-muted me-1"> Chưa có tài khoản</span>
                    <a th:href="@{/v1/auth/register}" class="text-decoration-none">Đăng kí tài khoản</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
