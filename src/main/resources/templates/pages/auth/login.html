<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Management - Đăng nhập</title>
    <link rel="stylesheet" href="/css/auth/style.css">
</head>
<body class="login-body">
<div class="login-wrapper">
    <div class="login-container">
        <div class="login-card">
            <div class="login-content">
                <div th:if="${error}" th:text="${error}" class="alert alert-danger" role="alert">
                    <button type="button" class="btn-close"></button>
                </div>
                <div th:if="${success}" th:text="${success}" class="alert alert-success" role="alert">
                    <button type="button" class="btn-close"></button>
                </div>

                <div class="login-header">
                    <h3 class="login-title">Hotel Management System</h3>
                    <p class="login-subtitle">Hãy đăng nhập tài khoản</p>
                </div>

                <form th:action="@{/v1/auth/login}" th:object="${loginRequestDTO}" method="post">
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <div class="input-group">
                            <input th:field="*{email}" type="email" class="form-control"
                                   id="email" placeholder="name@example.com" required autofocus>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input th:field="*{password}" type="password" class="form-control"
                               id="password" placeholder="*******" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-login">Login</button>
                    </div>
                </form>
            </div>

            <div class="card-footer">
                <span class="span-footer">Chưa có tài khoản?</span>
                <a th:href="@{/v1/auth/register}" class="a-footer">Đăng ký tài khoản</a>
            </div>
            <div class="card-footer">
                <a th:href="@{/v1/auth/forget-password}" class="a-footer">Quên mật khẩu</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
