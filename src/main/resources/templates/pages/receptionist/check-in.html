<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Check-in List</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    </style>
</head>

<body>
    <h1>Check-in</h1>
    <hr>

    <!-- Display Operation Result -->
    <div th:if="${successMessage}" style="color: green; margin-bottom: 15px;" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" style="color: red; margin-bottom: 15px;" th:text="${errorMessage}"></div>

    <!-- Search Booking Information -->
    <div style="margin-bottom: 15px; background-color: #f8f9fa; padding: 15px; border-radius: 5px; border: 1px solid #ccc;">
        <form th:action="@{/v1/receptionist/check-in}" method="get">
            <input type="text" name="search" th:value="${search}" placeholder="Search Guest Name / Room Number..." style="padding: 5px; width: 250px;">
            
            <label for="minPrice" style="margin-left: 10px;">Min Price:</label>
            <input type="number" id="minPrice" name="minPrice" th:value="${minPrice}" min="0" step="10000" style="width: 100px; padding: 5px;">
            
            <label for="maxPrice" style="margin-left: 10px;">Max Price:</label>
            <input type="number" id="maxPrice" name="maxPrice" th:value="${maxPrice}" min="0" step="10000" style="width: 100px; padding: 5px;">
            
            <label for="roomTypeId" style="margin-left: 10px;">Room Type:</label>
            <select id="roomTypeId" name="roomTypeId" style="padding: 5px;">
                <option value="">-- All Types --</option>
                <option th:each="rt : ${roomTypes}" th:value="${rt.roomTypeId}" th:text="${rt.typeName}" th:selected="${rt.roomTypeId == roomTypeId}"></option>
            </select>

            <button type="submit" style="margin-left: 10px; background-color: #007bff; color: white; padding: 5px 15px; border: none; border-radius: 3px; cursor: pointer;">Search</button>
        </form>
    </div>

    <table id="bookingTable">
        <thead>
            <tr>
                <th>Booking ID</th>
                <th>Customer</th>
                <th>Room Number</th>
                <th>Room Type</th>
                <th>Check-in Date</th>
                <th>Number of Guests</th>
                <th>Total Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="booking : ${bookings}">
                <td th:text="${booking.bookingId}"></td>
                <td th:text="${booking.customerName}"></td>
                <td th:text="${booking.roomNumber}"></td>
                <td th:text="${booking.roomTypeName}"></td>
                <td th:text="${booking.checkInDate}"></td>
                <td th:text="${booking.numberOfGuest}"></td>
                <td th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                <td th:text="${booking.status}"></td>
                <td>
                    <form th:action="@{/v1/receptionist/check-in}" method="post" onsubmit="return confirm('Confirm check-in for this guest?');">
                        <input type="hidden" name="bookingId" th:value="${booking.bookingId}" />
                        <button type="submit" style="background-color: #28a745; color: white; padding: 5px 15px; border: none; border-radius: 3px; cursor: pointer;">Check-in</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(bookings)}">
                <td colspan="9" style="text-align: center; padding: 20px;">No bookings pending check-in.</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
