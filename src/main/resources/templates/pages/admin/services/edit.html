<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Service</title>
</head>
<body>
<h1>Edit Service</h1>
<div th:if="${error}" style="color: red;">
    <p th:text="${error}"></p>
</div>
<form th:action="@{/v1/admin/services/edit/{id}(id=${serviceId})}" th:object="${serviceForm}" method="post">
    <div>
        <label>Service Name:</label>
        <input type="text" th:field="*{serviceName}">
    </div>

    <div>
        <label>Description:</label>
        <textarea th:field="*{description}"></textarea>
    </div>

    <div>
        <label>Price:</label>
        <input type="number" step="0.01" th:field="*{price}">
    </div>

    <div>
        <label>Status:</label>
        <select th:field="*{status}">
            <option value="ACTIVE">ACTIVE</option>
            <option value="INACTIVE">INACTIVE</option>
        </select>
    </div>

    <div>
        <button type="submit">Update Service</button>
        <a th:href="@{/v1/admin/services/list}">Cancel</a>
    </div>
</form>

</body>
</html>
