<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Service</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, "sans-serif";
            background: #fffdf5;
            color: #292524;
        }

        .service-form-page {
            max-width: 900;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-header h1 {
            margin: 0;
            font-size: 32px;
        }

        .form-header p {
            margin: 8px 0 0;
            color: #6b7280;
        }

        .form-card {
            background: white;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        }

        .service-form {
            display: grid;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14;
            background: white;
            box-sizing: border-box;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #b45309;
            box-shadow: 0 0 0 3px rgba(180, 83, 9, 0.15);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: #b45309;
            color: white;
        }

        .btn-primary:hover {
            background: #92400e;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        error-box {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
<div class="service-form-page">
    <div class="form-header">
        <div>
            <h1>Edit Service</h1>
            <p>Update hotel information, price and current status</p>
        </div>
        <a th:href="@{/v1/admin/services/list}" class="btn btn-secondary">Back to list</a>
    </div>

    <div class="form-card">
        <div th:if="${error}" class="error-box">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/v1/admin/services/edit/{id}(id=${serviceId})}" th:object="${serviceForm}" method="post"
              class="service-form">
            <div class="form-group">
                <label>Service Name:</label>
                <input type="text" th:field="*{serviceName}" placeholder="Enter service name">
                <p th:if="${#fields.hasErrors('serviceName')}"
                   th:errors="*{serviceName}"
                   style="color: #dc2626; font-size: 12px; margin: 4px 0 0;">Error</p>
            </div>

            <div class="form-group">
                <label>Description:</label>
                <textarea th:field="*{description}" placeholder="Enter service description"></textarea>
            </div>

            <div class="form-group">
                <label>Price:</label>
                <input type="number" step="0.01" th:field="*{price}" placeholder="Enter service price">
                <p th:if="${#fields.hasErrors('price')}"
                   th:errors="*{price}"
                   style="color: #dc2626; font-size: 12px; margin: 4px 0 0;">Error</p>
            </div>

            <div class="form-group">
                <label>Status:</label>
                <select th:field="*{status}">
                    <option value="ACTIVE">Đang hoạt động</option>
                    <option value="INACTIVE">Ngừng hoạt động</option>
                </select>
                <p th:if="${#fields.hasErrors('status')}"
                   th:errors="*{status}"
                   style="color: #dc2626; font-size: 12px; margin: 4px 0 0;">Error</p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Service</button>
                <a th:href="@{/v1/admin/services/list}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
