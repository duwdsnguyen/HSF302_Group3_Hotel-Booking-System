<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Service</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, "sans-serif";
            background: #f4f7fb;
            color: #1f2937;
        }

        .service-form-page {
            max-width: 820px;
            margin: 42px auto;
            padding: 0 20px;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-header h1 {
            margin: 0;
            font-size: 30px;
        }

        .form-header p {
            margin: 8px 0 0;
            color: #6b7280;
        }

        .form-card {
            background: white;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        .service-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: #0f766e;
            color: white;
        }

        .btn-primary:hover {
            background: #115e59;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .error-box {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #fee2e2;
            color: #991b1b;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>

<body>
<div class="service-form-page">
    <div class="form-header">
        <div>
            <h1>Add New Service</h1>
            <p>Create a new hotel service and configure its price and status</p>
        </div>
        <a th:href="@{/v1/admin/services/list}" class="btn btn-secondary">Back to list</a>
    </div>

    <div class="form-card">
        <!--        <div th:if="${error}" class="error-box">-->
        <!--            <p th:text="${error}"></p>-->
        <!--        </div>-->
        <div id="error-msg" class="error-box" style="display: none;"></div>
        <div id="success-msg" style="display: none; color: #166534; padding: 12px; background: #dcfce7; border-radius: 10px; margin-bottom: 16px; font-weight: 500;"></div>

        <!--        <form th:action="@{/v1/admin/services/add}" th:object="${serviceForm}" method="post" class="service-form">-->
        <form id="create-service-form" class="service-form">
            <div class="form-group">
                <label>Service Name:</label>
                <!--                <input type="text" th:field="*{serviceName}" placeholder="Enter service name">-->
                <input type="text" id="serviceName" name="serviceName" placeholder="Enter service name">
                <!--                <p th:if="${#fields.hasErrors('serviceName')}"-->
                <!--                   th:errors="*{serviceName}"-->
                <!--                   style="color: #dc2626; font-size: 12px; margin: 4px 0 0;">Error</p>-->
                <span id="error-serviceName" style="color: #dc2626; font-size: 12px; display: none;"></span>
            </div>

            <div class="form-group">
                <label>Description:</label>
                <!--                <textarea type="field" th:field="*{description}" placeholder="Enter description"></textarea>-->
                <textarea id="description" name="description" placeholder="Enter description"></textarea>
            </div>

            <div class="form-group">
                <label>Price:</label>
                <!--                <input type="number" step="0.01" th:field="*{price}" placeholder="Enter service price">-->
                <input type="number" step="0.01" id="price" name="price" placeholder="Enter service price">
                <!--                <p th:if="${#fields.hasErrors('price')}"-->
                <!--                   th:errors="*{price}"-->
                <!--                   style="color: #dc2626; font-size: 12px; margin: 4px 0 0;">Error</p>-->
                <span id="error-price" style="color: #dc2626; font-size: 12px; display: none;"></span>
            </div>

            <div class="form-group">
                <label>Status:</label>
                <!--                <select th:field="*{status}">-->
                <select id="status" name="status">
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="INACTIVE">INACTIVE</option>
                </select>
                <!--                <p th:if="${#fields.hasErrors('status')}"-->
                <!--                   th:errors="*{status}"-->
                <!--                   style="color: #dc2626; font-size: 12px; margin: 4px 0 0;">Error</p>-->
            </div>

            <div class="form-actions">
                <!--                <button type="submit" class="btn btn-primary">Create Service</button>-->
                <button type="button" id="btn-create" class="btn btn-primary">Create Service</button>
                <a th:href="@{/v1/admin/services/list}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    $(document).ready(function () {

        $('#btn-create').on('click', function () {
            // Ẩn thông báo cũ
            $('#error-msg').hide();
            $('#success-msg').hide();
            $('#error-serviceName').hide();
            $('#error-price').hide();

            // Validation phía client trước khi gửi
            var isValid = true;
            if ($('#serviceName').val().trim() === '') {
                $('#error-serviceName').text('Tên dịch vụ không được để trống').show();
                isValid = false;
            }
            if ($('#price').val() === '' || isNaN($('#price').val()) || parseFloat($('#price').val()) < 0) {
                $('#error-price').text('Giá phải là số và lớn hơn hoặc bằng 0').show();
                isValid = false;
            }
            if (!isValid) return; // Dừng nếu có lỗi, không gửi AJAX

            $('#btn-create').prop('disabled', true).text('Đang lưu...');

            $.ajax({
                url: '/v1/admin/services/add',
                type: 'POST',
                data: {
                    serviceName: $('#serviceName').val().trim(),
                    description: $('#description').val(),
                    price: $('#price').val(),
                    status: $('#status').val()
                },
                dataType: 'json',

                success: function (result) {
                    if (result.status === 'success') {
                        $('#success-msg').text(result.message).show();
                        setTimeout(function () {
                            window.location.href = result.redirect;
                        }, 1000);
                    } else {
                        $('#error-msg').text(result.message).show();
                        $('#btn-create').prop('disabled', false).text('Create Service');
                    }
                },

                error: function () {
                    $('#error-msg').text('Lỗi kết nối tới server. Vui lòng thử lại!').show();
                    $('#btn-create').prop('disabled', false).text('Create Service');
                }
            });
        });
    });
</script>

</body>
</html>
