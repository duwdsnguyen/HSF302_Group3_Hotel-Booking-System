<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Service</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, "sans-serif";
            background: #f4f7fb;
            color: #1f2937;
        }

        .service-form-page {
            max-width: 820px;
            margin: 42px auto;
            padding: 0 20px;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-header h1 {
            margin: 0;
            font-size: 30px;
        }

        .form-header p {
            margin: 8px 0 0;
            color: #6b7280;
        }

        .form-card {
            background: white;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        .service-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: #0f766e;
            color: white;
        }

        .btn-primary:hover {
            background: #115e59;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .error-box {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #fee2e2;
            color: #991b1b;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>

<body>
<div class="service-form-page">
    <div class="form-header">
        <div>
            <h1>Add New Service</h1>
            <p>Create a new hotel service and configure its price and status</p>
        </div>
        <a th:href="@{/v1/admin/services/list}" class="btn btn-secondary">Back to list</a>
    </div>

    <div class="form-card">
        <div th:if="${error}" class="error-box">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/v1/admin/services/add}" th:object="${serviceForm}" method="post" class="service-form">
            <div class="form-group">
                <label>Service Name:</label>
                <input type="text" th:field="*{serviceName}" placeholder="Enter service name">
                <p th:if="${#fields.hasErrors('serviceName')}"
                   th:errors="*{serviceName}"
                   style="color: #dc2626; font-size: 12px; margin: 4px 0 0;">Error</p>
            </div>

            <div class="form-group">
                <label>Description:</label>
                <textarea type="field" th:field="*{description}" placeholder="Enter description"></textarea>
            </div>

            <div class="form-group">
                <label>Price:</label>
                <input type="number" step="0.01" th:field="*{price}" placeholder="Enter service price">
                <p th:if="${#fields.hasErrors('price')}"
                   th:errors="*{price}"
                   style="color: #dc2626; font-size: 12px; margin: 4px 0 0;">Error</p>
            </div>

            <div class="form-group">
                <label>Status:</label>
                <select th:field="*{status}">
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="INACTIVE">INACTIVE</option>
                </select>
                <p th:if="${#fields.hasErrors('status')}"
                   th:errors="*{status}"
                   style="color: #dc2626; font-size: 12px; margin: 4px 0 0;">Error</p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create Service</button>
                <a th:href="@{/v1/admin/services/list}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
