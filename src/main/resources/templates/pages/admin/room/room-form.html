<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Room Form</title>
    <link rel="stylesheet" th:href="@{/css/admin-room.css}">
</head>
<body>

<div th:replace="~{layout/header :: header}"></div>
<main>
    <h1>Room Form</h1>

    <div class="page-actions">
        <a class="btn secondary" th:href="@{/admin/dashboard}">Back to Dashboard</a>
    </div>

<form class="room-form"
      th:action="@{${formAction}}"
      th:object="${room}"
      method="post">

    <div class="form-group">
        <label>Room Number:</label>
        <input type="text" th:field="*{roomNumber}">
    </div>

    <div class="form-group">
        <label>Room Type:</label>
        <select th:field="*{roomTypeId}">
            <option value="">-- Select room type --</option>
            <option th:each="roomType : ${roomTypes}"
                    th:value="${roomType.roomTypeId}"
                    th:text="${roomType.typeName}">
            </option>
        </select>
    </div>

    <div class="form-group">
        <label>Floor Number:</label>
        <input type="number" th:field="*{floorNumber}">
    </div>

    <div class="form-group">
        <label>Status:</label>
        <select th:field="*{status}">
            <option value="AVAILABLE">AVAILABLE</option>
            <option value="OCCUPIED">OCCUPIED</option>
            <option value="MAINTENANCE">MAINTENANCE</option>
        </select>
    </div>

    <div class="form-group">
        <label>Description:</label>
        <textarea th:field="*{description}"></textarea>
    </div>

    <div class="form-actions">
        <button class="btn" type="submit">Save</button>
        <a class="btn secondary" th:href="@{/admin/rooms}">Back</a>
    </div>

</form>
</main>

<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
