<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Room Type Form</title>
    <link rel="stylesheet" th:href="@{/css/admin-room.css}">
</head>
<body>

<div th:replace="~{layout/header :: header}"></div>
<main>
    <h1>Room Type Form</h1>

    <div class="page-actions">
        <a class="btn secondary" th:href="@{/v1/admin/dashboard}">Back to Dashboard</a>
        <a class="btn"
           th:if="${roomTypeId != null}"
           th:href="@{/v1/admin/room-types/{id}/images(id=${roomTypeId})}"
           style="background:#28a745; color:white; margin-left:8px;">
            🖼 Manage Images
        </a>
    </div>

    <form class="room-form"
          th:action="@{${formAction}}"
          th:object="${roomType}"
          method="post">

        <div class="form-group">
            <label>Type Name:</label>
            <input type="text" th:field="*{typeName}">
            <div class="error" th:if="${#fields.hasErrors('typeName')}" th:errors="*{typeName}"></div>
        </div>

        <div class="form-group">
            <label>Description:</label>
            <textarea th:field="*{description}"></textarea>
        </div>

        <div class="form-group">
            <label>Max Guests:</label>
            <input type="number" th:field="*{maxGuests}">
            <div class="error" th:if="${#fields.hasErrors('maxGuests')}" th:errors="*{maxGuests}"></div>
        </div>

        <div class="form-group">
            <label>Base Price:</label>
            <input type="number" th:field="*{basePrice}">
            <div class="error" th:if="${#fields.hasErrors('basePrice')}" th:errors="*{basePrice}"></div>
        </div>

        <div class="form-group">
            <label>Status:</label>
            <select th:field="*{status}">
                <option value="ACTIVE">ACTIVE</option>
                <option value="INACTIVE">INACTIVE</option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
        </div>

        <div class="form-actions">
            <button class="btn" type="submit">Save</button>
            <a class="btn secondary" th:href="@{/v1/admin/room-types}">Back</a>
        </div>

    </form>
</main>
<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
