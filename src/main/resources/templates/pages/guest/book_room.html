<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        window.jQuery || document.write('<script src="https:\/\/code.jquery.com\/jquery-3.7.1.min.js<\/script>"');
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #333; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #007bff; }
        .section { margin-bottom: 25px; }
        .room-item { background: #e9ecef; padding: 15px; border-radius: 5px; margin-bottom: 10px; border-left: 5px solid #007bff; }
        .service-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .service-item input { transform: scale(1.5); margin-right: 15px; cursor: pointer; }
        .summary-box { background-color: #e2f0d9; padding: 20px; border-radius: 8px; font-size: 1.2em; }
        .price { color: #28a745; font-weight: bold; font-size: 1.5em; }
        .btn-confirm { background-color: #28a745; color: white; padding: 15px 30px; font-size: 1.2em; border: none; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-confirm:hover { background-color: #218838; }
        .btn-confirm:disabled { background-color: #6c757d; cursor: not-allowed; }
        .btn-cancel { background-color: #dc3545; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px; }
        #error-msg { color: red; padding: 10px; border: 1px solid red; background: #ffe6e6; margin-bottom: 15px; display: none; border-radius: 5px; }
        #success-msg { color: green; padding: 10px; border: 1px solid green; background: #e6ffe6; margin-bottom: 15px; display: none; border-radius: 5px; }
        #loading-msg { color: #007bff; padding: 10px; background: #e8f4ff; margin-bottom: 15px; display: none; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Review Your Booking</h2>
    <!--    <form th:action="@{/v1/guest/booking/create}" method="POST">-->
    <form id="booking-form">
        <input type="hidden" id="roomId" name="roomId" th:value="${roomId}">
        <input type="hidden" id="checkInDate" name="checkInDate" th:value="${checkInDate}">
        <input type="hidden" id="checkOutDate" name="checkOutDate" th:value="${checkOutDate}">
        <input type="hidden" id="numberOfGuests" name="numberOfGuests" th:value="${numberOfGuests}">

        <!--    <div th:if="${error}" style="color: red; padding: 10px; border: 1px solid red; background: #ffe6e6; margin-bottom: 20px;" th:text="${error}"></div>-->

        <div id="error-msg"></div>
        <div id="success-msg"></div>
        <div id="loading-msg"> Đang xử lý đơn đặt phòng, vui lòng chờ...</div>

        <div class="section">
            <h3>Guest Information</h3>
            <p><strong>Name:</strong> <span th:text="${user.fullName}"></span></p>
            <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
        </div>

        <div class="section">
            <h3>Booking Details</h3>
            <p><strong>Check-in:</strong> <span th:text="${checkInDate}"></span></p>
            <p><strong>Check-out:</strong> <span th:text="${checkOutDate}"></span></p>
            <p><strong>Duration:</strong> <span th:text="${days}"></span> night(s)</p>
            <p><strong>Guests:</strong> <span th:text="${numberOfGuests}"></span></p>
        </div>

        <div class="section">
            <h3>Selected Room</h3>
            <div class="room-item">
                <h4 th:text="'Room ' + ${room.roomNumber} + ' (' + ${room.roomType.typeName} + ')'" style="margin-top: 0;"></h4>
                <p style="margin-bottom: 0;">Price per night: $<span th:text="${room.roomType.basePrice}"></span></p>
            </div>
            <p style="text-align: right; font-weight: bold;">Room Subtotal: $<span id="roomsTotal" th:text="${totalRoomsAmount}"></span></p>
        </div>

        <div class="section" th:if="${!#lists.isEmpty(availableServices)}">
            <h3>Additional Services</h3>
            <div th:each="svc : ${availableServices}" class="service-item">
                <label style="cursor: pointer; display: flex; align-items: center;">
                    <input type="checkbox" name="serviceIds" th:value="${svc.serviceId}" class="service-checkbox" th:data-price="${svc.price}">
                    <div>
                        <strong th:text="${svc.serviceName}"></strong> - $<span th:text="${svc.price}"></span>
                        <div style="font-size: 0.9em; color: #666;" th:text="${svc.description}"></div>
                    </div>
                </label>
            </div>
        </div>

        <div class="summary-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong>Grand Total:</strong>
                <div class="price">$<span id="grandTotalDisplay" th:text="${totalRoomsAmount}"></span></div>
            </div>
        </div>

<!--        <button type="submit" class="btn-confirm">Confirm Booking</button>-->
        <button type="button" id="btn-confirm" class="btn-confirm">Confirm Booking</button>
    </form>

    <div style="text-align: center;">
        <a th:href="@{/v1/guest/search-rooms(checkInDate=${checkInDate},checkOutDate=${checkOutDate},numberOfGuests=${numberOfGuests})}" class="btn-cancel">Cancel and Go Back</a>
    </div>

</div>

<script>
    $(document).ready(function() {

        const roomsTotal = parseFloat($('#roomsTotal').text());

        function calculateTotal() {
            let servicesTotal = 0;
            $('.service-checkbox:checked').each(function() {
                servicesTotal += parseFloat($(this).data('price'));
            });
            const grandTotal = roomsTotal + servicesTotal;
            $('#grandTotalDisplay').text(grandTotal.toFixed(2));
        }

        $('.service-checkbox').on('change', calculateTotal);

        $('#btn-confirm').on('click', function() {

            var serviceIds = [];
            $('.service-checkbox:checked').each(function() {
                serviceIds.push($(this).val());
            });

            var formData = {
                roomId: $('#roomId').val(),
                checkInDate: $('#checkInDate').val(),
                checkOutDate: $('#checkOutDate').val(),
                numberOfGuests: $('#numberOfGuests').val(),
                serviceIds: serviceIds
            };

            $('#btn-confirm').prop('disabled', true).text('Đang xử lý...');
            $('#loading-msg').show();
            $('#error-msg').hide();
            $('#success-msg').hide();

            $.ajax({
                url: '/v1/guest/booking/create',
                type: 'POST',
                data: formData,
                dataType: 'json',

                success: function(result) {
                    if (result.status === 'success') {
                        $('#success-msg').text(result.message).show();
                        setTimeout(function() {
                            window.location.href = result.redirect;
                        }, 1000);

                    } else if (result.status === 'error' && result.redirect) {
                        window.location.href = result.redirect;

                    } else {
                        $('#error-msg').text(result.message).show();
                        $('#btn-confirm').prop('disabled', false).text('Confirm Booking');
                    }
                },

                error: function(xhr, status, error) {
                    $('#error-msg').text('Lỗi kết nối tới server. Vui lòng thử lại!').show();
                    $('#btn-confirm').prop('disabled', false).text('Confirm Booking');
                },

                // Bước 6: Luôn chạy cuối cùng, dù thành công hay thất bại
                complete: function() {
                    $('#loading-msg').hide();
                }
            });
        });
    });
</script>

</body>
</html>
