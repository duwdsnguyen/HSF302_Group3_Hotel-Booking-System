<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Room Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f7f6;
        }

        .detail-container {
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0;
            color: #333;
        }

        .btn-back {
            background-color: #6c757d;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 4px;
        }

        .btn-back:hover {
            background-color: #5a6268;
        }

        .room-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-card {
            flex: 1 1 calc(50% - 20px);
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .info-card h4 {
            margin-top: 0;
            color: #007bff;
        }

        .info-card p {
            margin: 8px 0;
        }

        .price {
            font-size: 24px;
            color: #28a745;
            font-weight: bold;
        }

        .facilities {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .facility-badge {
            background-color: #e9ecef;
            color: #495057;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #ced4da;
        }

        .action-section {
            text-align: right;
            margin-top: 30px;
        }

        .btn-book {
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-book:hover {
            background-color: #218838;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
        }

        .status-available {
            background-color: #28a745;
        }

        .status-unavailable {
            background-color: #dc3545;
        }
    </style>
</head>

<body>

    <div class="detail-container">
        <div class="header">
            <h2 th:text="'Room ' + ${room.roomNumber}">Room Detail</h2>
            <a th:href="@{/v1/guest/search-rooms(checkInDate=${param.checkInDate},checkOutDate=${param.checkOutDate},numberOfGuests=${param.numberOfGuests})}"
                class="btn-back">Back to Search Results</a>
        </div>

        <div class="info-grid">
            <!-- Room Info -->
            <div class="info-card">
                <h4>Room Information</h4>
                <p><strong>Type:</strong> <span th:text="${room.roomType.typeName}"></span></p>
                <p><strong>Floor:</strong> <span th:text="${room.floorNumber}"></span></p>
                <p><strong>Capacity:</strong> Up to <span th:text="${room.roomType.maxGuests}"></span> Guest(s)</p>
                <p><strong>Status:</strong>
                    <span
                        th:class="${room.status.name() == 'AVAILABLE'} ? 'status-badge status-available' : 'status-badge status-unavailable'"
                        th:text="${room.status}"></span>
                </p>
                <p><strong>Description:</strong> <span
                        th:text="${room.description != null ? room.description : room.roomType.description}"></span></p>
            </div>
        </div>

        <div class="action-section">
            <a th:if="${room.status.name() == 'AVAILABLE'}" th:href="@{/v1/guest/booking/create(roomId=${room.roomId},checkInDate=${param.checkInDate},checkOutDate=${param.checkOutDate},numberOfGuests=${param.numberOfGuests})}" class="btn-book">Proceed to Book Now</a>
            <button th:unless="${room.status.name() == 'AVAILABLE'}" disabled class="btn-book"
                style="background-color: #6c757d; cursor: not-allowed;">Room Currently Unavailable</button>
        </div>
    </div>

</body>

</html>
