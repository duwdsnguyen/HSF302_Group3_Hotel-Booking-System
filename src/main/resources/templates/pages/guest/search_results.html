<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
    <style>
        .room-card {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            display: flex;
            align-items: center;
        }
        .room-info {
            flex-grow: 1;
        }
        .room-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            font-size: 1.1em;
            color: #007bff;
        }
        .checkbox-container input {
            width: 20px;
            height: 20px;
        }
    </style>
</head>

<body>
<h1>Search Results</h1>

<p>
    Showing available rooms from <b th:text="${checkIn}"></b>
    to <b th:text="${checkOut}"></b> for <b th:text="${guests}"></b> guest(s).
</p>

<a th:href="@{/v1/guest/dashboard}">Back to Dashboard</a>

<hr>

<div style="background-color: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
    <h3>Filter Rooms</h3>
    <form th:action="@{/v1/guest/search-rooms}" method="GET">

        <input type="hidden" name="checkInDate" th:value="${checkIn}">
        <input type="hidden" name="checkOutDate" th:value="${checkOut}">
        <input type="hidden" name="numberOfGuests" th:value="${guests}">

        <label for="minPrice">Min Price ($):</label>
        <input type="number" id="minPrice" name="minPrice" th:value="${minPrice}" min="0" step="0.01" style="width: 100px;">

        <label for="maxPrice" style="margin-left: 10px;">Max Price ($):</label>
        <input type="number" id="maxPrice" name="maxPrice" th:value="${maxPrice}" min="0" step="0.01" style="width: 100px;">

        <label for="roomTypeId" style="margin-left: 15px;">Room Type:</label>
        <select id="roomTypeId" name="roomTypeId">
            <option value="">-- All Types --</option>
            <option th:each="type : ${roomTypes}"
                    th:value="${type.roomTypeId}"
                    th:selected="${roomTypeId == type.roomTypeId}"
                    th:text="${type.typeName}">
            </option>
        </select>

        <button type="submit" style="margin-left: 15px; background-color: #28a745; color: white; padding: 5px 15px; border: none; border-radius: 3px;">
            Apply Filter
        </button>
    </form>
</div>

<hr>

<div th:if="${error}" style="color: red; font-weight: bold; margin-bottom: 15px;" th:text="${error}"></div>

<div th:if="${#lists.isEmpty(rooms)}">
    <h3 style="color: orange;">Sorry, there are no available rooms for the selected dates!</h3>
</div>

<div th:if="${!#lists.isEmpty(rooms)}">
    <h3 style="color: green;">Great! We found <span th:text="${rooms.size()}"></span> available rooms:</h3>

    <form th:action="@{/v1/guest/booking/create}" method="GET">
        <input type="hidden" name="checkInDate" th:value="${checkIn}">
        <input type="hidden" name="checkOutDate" th:value="${checkOut}">
        <input type="hidden" name="numberOfGuests" th:value="${guests}">

        <div style="margin-bottom: 20px;">
            <button type="submit" style="background-color: #ff9900; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; font-weight: bold;">
                Book Selected Rooms
            </button>
        </div>

        <div th:each="room : ${rooms}" class="room-card">
            <div class="room-info">
                <h2 th:text="'Room ' + ${room.roomNumber}">Room Name</h2>
                <p><b>Floor:</b> <span th:text="${room.floorNumber}"></span></p>
                <p><b>Room Type:</b> <span th:text="${room.roomType.typeName}"></span></p>
                <p><b>Max Guests:</b> <span th:text="${room.roomType.maxGuests}"></span></p>
                <p><b>Base Price:</b> $<span th:text="${room.roomType.basePrice}"></span></p>
                <p><b>Description:</b> <span th:text="${room.description}"></span></p>
            </div>
            
            <div class="room-actions">
                <label class="checkbox-container">
                    Select to book
                    <input type="checkbox" name="roomIds" th:value="${room.roomId}">
                </label>
                <a th:href="@{/v1/guest/room/{id}(id=${room.roomId},checkInDate=${checkIn},checkOutDate=${checkOut},numberOfGuests=${guests})}" style="background-color: #17a2b8; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; text-align: center; width: 120px;">View Details</a>
                <a th:href="@{/v1/guest/booking/create(roomIds=${room.roomId},checkInDate=${checkIn},checkOutDate=${checkOut},numberOfGuests=${guests})}" style="background-color: #007bff; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; text-align: center; width: 120px;">Book Now</a>
            </div>
        </div>
    </form>
</div>

</body>
</html>
