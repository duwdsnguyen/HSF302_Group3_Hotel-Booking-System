<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Room Types</title>
</head>
<body>

<h1>Room Type Management</h1>

<a th:href="@{/admin/room-types/create}">Add Room Type</a>

<table th:border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Type Name</th>
        <th>Description</th>
        <th>Max Guests</th>
        <th>Base Price</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="roomType : ${roomTypes}">
        <td th:text="${roomType.roomTypeId}"></td>
        <td th:text="${roomType.typeName}"></td>
        <td th:text="${roomType.description}"></td>
        <td th:text="${roomType.maxGuests}"></td>
        <td th:text="${roomType.basePrice}"></td>
        <td th:text="${roomType.status}"></td>
        <td>
            <a th:href="@{/admin/room-types/edit/{id}(id=${roomType.roomTypeId})}">Edit</a>
            |
            <a th:href="@{/admin/room-types/delete/{id}(id=${roomType.roomTypeId})}"
               onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
