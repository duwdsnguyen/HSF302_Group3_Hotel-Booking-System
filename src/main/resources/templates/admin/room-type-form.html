<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Room Type Form</title>
</head>
<body>

<h1>Room Type Form</h1>

<form th:action="@{${formAction}}"
      th:object="${roomType}"
      method="post">

    <div>
        <label>Type Name:</label>
        <input type="text" th:field="*{typeName}">
    </div>

    <div>
        <label>Description:</label>
        <textarea th:field="*{description}"></textarea>
    </div>

    <div>
        <label>Max Guests:</label>
        <input type="number" th:field="*{maxGuests}">
    </div>

    <div>
        <label>Base Price:</label>
        <input type="number" th:field="*{basePrice}">
    </div>

    <div>
        <label>Status:</label>
        <select th:field="*{status}">
            <option value="ACTIVE">ACTIVE</option>
            <option value="INACTIVE">INACTIVE</option>
        </select>
    </div>

    <button type="submit">Save</button>
    <a th:href="@{/admin/room-types}">Back</a>

</form>

</body>
</html>
